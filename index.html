```html
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIFFF // RAVEN_AR_LINK</title>
    <!-- MindAR & A-Frame: The best free web-based AR engines -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-aframe.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        .ar-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            font-family: monospace;
            color: #ff0000;
        }
        
        /* The Swarm Animation */
        .bird {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 90;
            animation: fly linear infinite;
        }

        @keyframes fly {
            0% { transform: translate(-100vw, 20vh) scale(0.5); }
            50% { transform: translate(50vw, 50vh) scale(1.2); }
            100% { transform: translate(200vw, 10vh) scale(0.5); }
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    
    <!-- UI Elements -->
    <div class="ar-overlay">
        <div class="flex justify-between uppercase text-[10px] tracking-[0.3em]">
            <div>Status: Detecting_Biometric_Target</div>
            <div>BIFFF_OS_2026</div>
        </div>
        
        <div id="instruction" class="text-center bg-black/40 p-4 border border-red-900/30 backdrop-blur-md">
            <p class="text-xs uppercase tracking-widest">Point camera at face</p>
            <p class="text-[9px] opacity-50">THE RAVEN WILL FIND ITS PERCH</p>
        </div>
    </div>

    <!-- Background Swarm (2D Silhouettes) -->
    <div id="swarm-container"></div>

    <!-- AR Scene -->
    <a-scene 
        mindar-face="uiScanning: #instruction" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- The Official Mascot Shape -->
            <img id="raven-mascot" src="https://i.imgur.com/8mYvU3i.png" crossorigin="anonymous">
        </a-assets>

        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Face Target: 10 is the forehead area. 
             We offset it to land on the shoulder/side of head -->
        <a-entity mindar-face-target="anchorIndex: 10">
            <a-image 
                src="#raven-mascot" 
                position="0.8 0.5 -0.5" 
                scale="1.2 1.2 1.2" 
                rotation="0 0 -10"
                animation="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: 0.82 0.55 -0.5">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        // Generating the "Swarm" of ravens flying in 2D
        const container = document.getElementById('swarm-container');
        const birdSvg = `
            <svg viewBox="0 0 100 100" width="100" height="100">
                <path d="M10 50 L40 45 L50 10 L60 45 L90 50 L60 55 L50 90 L40 55 Z" fill="red" />
            </svg>
        `;

        for(let i=0; i<8; i++) {
            const bird = document.createElement('div');
            bird.className = 'bird';
            bird.innerHTML = birdSvg;
            bird.style.top = Math.random() * 80 + 'vh';
            bird.style.animationDuration = (5 + Math.random() * 10) + 's';
            bird.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(bird);
        }

        // Hide instruction once face is found
        window.addEventListener("targetFound", event => {
            document.getElementById('instruction').style.display = 'none';
        });
    </script>
</body>
</html>
