<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIF-OS // ANTHOLOGY 10.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; background-color: black; font-family: 'Space Mono', monospace; overflow: hidden; }
        .crt-overlay {
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            opacity: 0.2;
        }
        .perspective-view { perspective: 1000px; }
        .pixel-text { text-shadow: 2px 2px 0px #7a0000; }
        @keyframes scan { from { transform: translateY(-100%); } to { transform: translateY(100%); } }
        .scanline { position: absolute; width: 100%; height: 100px; background: linear-gradient(to bottom, transparent, rgba(255,0,0,0.1), transparent); animation: scan 8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const RAVEN_PATH = "M210,145 C205,100 210,65 210,65 C210,65 230,40 300,40 C370,40 390,65 390,65 C390,65 395,100 390,145 Z M180,145 C180,145 200,165 300,165 C400,165 420,145 420,145 L420,158 C420,158 400,175 300,175 C200,175 180,158 180,158 Z M220,175 C210,220 220,280 280,380 L320,450 L340,380 C360,350 430,300 440,200 L420,175 Z M280,380 L230,340 L260,330 L220,300 L250,290 L215,260 Z M260,175 C250,200 260,240 300,280 L320,320 L330,280 Q350,240 370,175 Z";
        const PAZUZU_PATH = "M50 45 L15 15 L5 45 L45 55 Z M50 45 L85 15 L95 45 L55 55 Z M50 65 L15 65 L10 85 L45 75 Z M50 65 L85 65 L90 85 L55 75 Z M46 35 L54 35 L52 88 L48 88 Z M42 30 L50 15 L58 30 L55 38 L45 38 Z";

        const LEVELS = [
            { id: 1, name: "PONG_BREACH", desc: "DEFLECT THE VIRUS BALL. USE THE RAVEN AS A SHIELD.", year: 2017 },
            { id: 2, name: "DUCK_HUNT", desc: "TARGET DETECTED. TAP THE PAZUZUS TO NEUTRALIZE.", year: 2018 },
            { id: 3, name: "DATA_INVADERS", desc: "LOCKED AT BASE. TAP TO SHOOT AND STOP THE INVASION.", year: 2019 },
            { id: 4, name: "TERMINAL_DOOM", desc: "PSEUDO-3D BREACH. TAP TO FIRE INTO THE DEPTHS.", year: 2020 },
            { id: 5, name: "GHOST_HUNTER", desc: "EVADE THE PURSUIT IN THE DATA VOID.", year: 2021 },
            { id: 6, name: "DATA_HIGHWAY", desc: "FROGGER PROTOCOL. CROSS THE FLOW WITHOUT COLLISION.", year: 2022 },
            { id: 7, name: "TETRIS_CRUSH", desc: "DATA BLOCKS FALLING. FIND THE GAP TO SURVIVE.", year: 2023 },
            { id: 8, name: "ASTEROIDS", desc: "MULTI-DIRECTIONAL COMBAT. TAP TO BLAST DEBRIS.", year: 2024 },
            { id: 9, name: "CENTIPEDE", desc: "SEGMENTED THREAT. SHOOT THE CHAINS FROM THE BOTTOM.", year: 2025 },
            { id: 10, name: "GLITCH_REALITY", desc: "TOTAL CHAOS. ALL SYSTEMS COMBINED. SURVIVE.", year: 2026 },
        ];

        const App = () => {
            const [gameState, setGameState] = useState('START'); // START, INTRO, PLAYING, RETRY, GAMEOVER, WIN
            const [level, setLevel] = useState(1);
            const [lives, setLives] = useState(3);
            const [timeLeft, setTimeLeft] = useState(10);
            const [isDemo, setIsDemo] = useState(false);
            const [score, setScore] = useState(0);

            const requestRef = useRef();
            const playerRef = useRef({ x: window.innerWidth/2, y: window.innerHeight/2, tx: window.innerWidth/2, ty: window.innerHeight/2 });
            const entitiesRef = useRef([]);
            const projsRef = useRef([]);

            const handleStart = (demo = false) => {
                setIsDemo(demo);
                setScore(0);
                setLives(demo ? 99 : 3);
                loadLevel(1);
            };

            const loadLevel = (lvl) => {
                setLevel(lvl);
                setGameState('INTRO');
                entitiesRef.current = [];
                projsRef.current = [];
                
                setTimeout(() => {
                    setupLevel(lvl);
                    setGameState('PLAYING');
                    setTimeLeft(10);
                }, 2000);
            };

            const setupLevel = (lvl) => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                playerRef.current.tx = w / 2;
                playerRef.current.ty = (lvl === 1 || lvl === 3 || lvl === 9 || lvl === 7) ? h - 120 : h / 2;

                if (lvl === 1) {
                    entitiesRef.current = [{ x: w / 2, y: 100, vx: 4, vy: 4, size: 50, id: 1 }];
                } else if (lvl === 3) {
                    for (let i = 0; i < 15; i++) {
                        entitiesRef.current.push({ x: (i % 5) * 120 + 100, y: Math.floor(i / 5) * 60 + 80, vx: 1.5, vy: 0, size: 45, id: i });
                    }
                }
            };

            const handleDeath = () => {
                if (isDemo) return;
                const nextLives = lives - 1;
                setLives(nextLives);
                if (nextLives > 0) setGameState('RETRY');
                else setGameState('GAMEOVER');
            };

            const gameLoop = (t) => {
                if (gameState !== 'PLAYING') return;

                const p = playerRef.current;
                const w = window.innerWidth;
                const h = window.innerHeight;

                // Move Player
                const lockY = (level === 1 || level === 3 || level === 9 || level === 7);
                p.x += (p.tx - p.x) * 0.15;
                if (!lockY) p.y += (p.ty - p.y) * 0.15;
                else p.y = h - 120;

                const entities = entitiesRef.current;
                const projs = projsRef.current;

                // Move Projectiles
                for(let i = projs.length - 1; i >= 0; i--) {
                    const pr = projs[i];
                    pr.x += pr.vx; pr.y += pr.vy;
                    entities.forEach((en, eIdx) => {
                        if (Math.hypot(pr.x - en.x, pr.y - en.y) < en.size) {
                            entities.splice(eIdx, 1);
                            projs.splice(i, 1);
                            setScore(s => s + 50);
                        }
                    });
                    if (pr.y < -50 || pr.y > h + 50 || pr.x < -50 || pr.x > w + 50) projs.splice(i, 1);
                }

                // Level Logic
                switch(level) {
                    case 1: // Pong
                        const ball = entities[0];
                        if (ball) {
                            ball.x += ball.vx; ball.y += ball.vy;
                            if (ball.x < 50 || ball.x > w - 100) ball.vx *= -1;
                            if (ball.y < 80) ball.vy *= -1;
                            if (ball.y > p.y - 40 && ball.x > p.x - 70 && ball.x < p.x + 70) {
                                ball.vy *= -1.02; ball.y = p.y - 45;
                            }
                            if (ball.y > h + 50) handleDeath();
                        }
                        break;
                    case 2: // Duck Hunt
                        if (Math.random() < 0.04) entities.push({ x: Math.random() * w, y: h + 50, vx: (Math.random() - 0.5) * 8, vy: -11, size: 55, id: Date.now() });
                        entities.forEach(en => {
                            en.vy += 0.22; en.x += en.vx; en.y += en.vy;
                            if (Math.hypot(p.x - en.x, p.y - en.y) < 45) handleDeath();
                        });
                        break;
                    case 3: // Invaders
                        let bounce = false;
                        entities.forEach(en => { en.x += en.vx; if (en.x > w - 80 || en.x < 40) bounce = true; if (Math.hypot(p.x - en.x, p.y - en.y) < 45) handleDeath(); });
                        if (bounce) entities.forEach(en => { en.vx *= -1; en.y += 12; });
                        break;
                    case 4: // Doom
                        if (Math.random() < 0.08) entities.push({ z: 0, x: Math.random() * w, y: Math.random() * h, size: 5, id: Date.now() });
                        entities.forEach(en => { en.z += 0.015; if (en.z > 0.95 && Math.hypot(p.x - en.x, p.y - en.y) < 70) handleDeath(); });
                        break;
                    case 7: // Tetris
                        if (Math.random() < 0.06) entities.push({ x: Math.floor(Math.random() * (w / 120)) * 120 + 60, y: -100, size: 100, id: Date.now() });
                        entities.forEach(en => { en.y += 5; if (Math.abs(p.x - en.x) < 55 && Math.abs(p.y - en.y) < 55) handleDeath(); });
                        break;
                    case 9: // Centipede
                        if (entities.length < 5) {
                            const sx = Math.random() * w;
                            for(let i=0; i<8; i++) entities.push({ x: sx + (i*30), y: 100, vx: 2, vy: 0, size: 30, id: Date.now()+i });
                        }
                        entities.forEach(en => { en.x += en.vx; if (en.x > w - 30 || en.x < 30) { en.vx *= -1; en.y += 30; } if (Math.hypot(p.x - en.x, p.y - en.y) < 30) handleDeath(); });
                        break;
                    default: // Chase
                        if (Math.random() < 0.04 + (level * 0.005)) entities.push({ x: Math.random() * w, y: -100, speed: 1.5 + level * 0.2, id: Date.now(), size: 50 });
                        entities.forEach(en => {
                            const dx = p.x - en.x; const dy = p.y - en.y; const d = Math.hypot(dx, dy);
                            en.x += (dx / d) * en.speed; en.y += (dy / d) * en.speed;
                            if (d < 45) handleDeath();
                        });
                }

                requestRef.current = requestAnimationFrame(gameLoop);
            };

            const interact = (e) => {
                if (gameState !== 'PLAYING') return;
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                const p = playerRef.current;
                p.tx = cx;
                if (!(level === 1 || level === 3 || level === 9 || level === 7)) p.ty = cy;

                if (e.type === 'mousedown' || e.type === 'touchstart') {
                    // Shoot mechanic
                    if (level === 2 || level === 4) { // Hitscan
                        entitiesRef.current = entitiesRef.current.filter(en => {
                            const d = Math.hypot(cx - en.x, cy - en.y);
                            if (d < (level === 4 ? en.size * 2 : en.size) + 30) { setScore(s => s + 100); return false; }
                            return true;
                        });
                    } else if (level === 3 || level === 8 || level === 9) { // Projectile
                        projsRef.current.push({ x: p.x, y: p.y, vx: level === 8 ? (cx - p.x) * 0.05 : 0, vy: level === 8 ? (cy - p.y) * 0.05 : -10, id: Math.random() });
                    }
                }
            };

            useEffect(() => {
                if (gameState === 'PLAYING') {
                    requestRef.current = requestAnimationFrame(gameLoop);
                    const t = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                clearInterval(t);
                                if (level === 10) setGameState('WIN');
                                else loadLevel(level + 1);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => { cancelAnimationFrame(requestRef.current); clearInterval(t); };
                }
            }, [gameState, level]);

            return (
                <div className="w-screen h-screen bg-black overflow-hidden relative cursor-crosshair select-none text-white" 
                     onMouseMove={interact} onMouseDown={interact} onTouchMove={interact} onTouchStart={interact}>
                    
                    <div className="crt-overlay"></div>
                    <div className="scanline"></div>

                    {/* HUD */}
                    <header className="absolute top-0 w-full p-6 flex justify-between items-center z-50 border-b border-red-900/30 bg-black/50 backdrop-blur-md">
                        <div className="flex flex-col gap-1">
                            <span className="text-[10px] text-red-500 opacity-60 uppercase tracking-widest">Neural_Sync</span>
                            <div className="flex gap-1.5">
                                {[...Array(isDemo ? 1 : lives)].map((_, i) => (
                                    <div key={i} className="w-3 h-3 bg-red-600 rounded-full animate-pulse shadow-[0_0_8px_red]"></div>
                                ))}
                            </div>
                        </div>
                        <div className="text-center">
                            <h2 className="text-sm font-bold tracking-[0.3em] uppercase">{LEVELS[level-1].name}</h2>
                            <span className={`text-[10px] ${timeLeft < 3 ? 'text-red-500 animate-pulse' : 'text-zinc-500'}`}>{timeLeft}s TO STABILIZE</span>
                        </div>
                        <div className="text-right">
                            <span className="text-[10px] text-red-500 opacity-60 uppercase">Year</span>
                            <div className="text-xl font-bold">{LEVELS[level-1].year}</div>
                        </div>
                    </header>

                    {/* GAME WORLD */}
                    <main className={`w-full h-full relative ${level === 4 ? 'perspective-view' : ''}`}>
                        {gameState === 'PLAYING' && (
                            <>
                                {projsRef.current.map(pr => (
                                    <div key={pr.id} className="absolute bg-white w-1.5 h-3 rounded-full shadow-[0_0_8px_white]" style={{ left: pr.x, top: pr.y }} />
                                ))}
                                <div className="absolute z-40 transition-transform duration-75" style={{ left: playerRef.current.x - 45, top: playerRef.current.y - 45, width: '90px', height: '90px', transform: `rotate(${(playerRef.current.tx - playerRef.current.x) * 0.12}deg) ${playerRef.current.tx < playerRef.current.x ? 'scaleX(-1)' : 'scaleX(1)'}` }}>
                                    <svg viewBox="0 0 500 500" className="w-full h-full drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
                                        <path d={RAVEN_PATH} fill="white" />
                                        <path d="M335,190 Q365,190 385,215 Q355,230 335,220 Z" fill="#ff0000" />
                                    </svg>
                                </div>
                                {entitiesRef.current.map(en => (
                                    <div key={en.id} className="absolute" style={{ left: en.x - (en.size/2), top: en.y - (en.size/2), width: en.size + 'px', height: en.size + 'px', transform: level === 4 ? `translateZ(${en.z * 800}px) scale(${en.z * 5})` : 'none', opacity: level === 4 ? en.z : 1 }}>
                                        <svg viewBox="0 0 100 100" className="w-full h-full"><path d={PAZUZU_PATH} fill="red" /></svg>
                                    </div>
                                ))}
                            </>
                        )}
                    </main>

                    {/* SCREENS */}
                    {gameState === 'START' && (
                        <div className="absolute inset-0 bg-black z-[300] flex flex-col items-center justify-center p-12 text-center border-[20px] border-double border-red-900/20 m-4">
                            <h1 className="text-6xl font-bold italic mb-4 tracking-tighter uppercase pixel-text italic">BIF-OS // ANTHOLOGY</h1>
                            <p className="text-red-600 max-w-sm text-[10px] tracking-[0.4em] uppercase mb-12 leading-relaxed font-bold">10 YEARS OF HISTORY. 3 NEURAL ATTEMPTS. <br/> RESTORE THE RAVEN ARCHIVE.</p>
                            <div className="flex flex-col gap-5">
                                <button onClick={() => handleStart(false)} className="border-2 border-red-600 px-12 py-4 text-red-600 font-bold tracking-[0.5em] hover:bg-red-600 hover:text-black transition-all uppercase">[ Initialize Survival ]</button>
                                <button onClick={() => handleStart(true)} className="text-zinc-600 text-[9px] hover:text-red-500 transition-colors uppercase">[ Auto-Demo Mode ]</button>
                            </div>
                        </div>
                    )}

                    {gameState === 'INTRO' && (
                        <div className="absolute inset-0 bg-black/95 backdrop-blur-xl z-[300] flex flex-col items-center justify-center p-10 text-center">
                            <span className="text-red-500 text-[10px] mb-2 tracking-[1em] uppercase opacity-50">Year {LEVELS[level-1].year} Loading</span>
                            <h2 className="text-6xl font-bold italic mb-6 text-white tracking-tighter uppercase">{LEVELS[level-1].name}</h2>
                            <p className="max-w-md text-xs text-red-600/80 uppercase tracking-[0.2em] border-t border-red-900/30 pt-6 leading-loose">{LEVELS[level-1].desc}</p>
                        </div>
                    )}

                    {gameState === 'RETRY' && (
                        <div className="absolute inset-0 bg-red-950/40 backdrop-blur-lg z-[300] flex flex-col items-center justify-center text-center p-8">
                            <h2 className="text-6xl text-white font-bold mb-4 tracking-tighter uppercase">Integrity Compromised</h2>
                            <p className="text-xs tracking-[0.5em] mb-12 opacity-80 uppercase">{lives} Neural Syncs Left.</p>
                            <button onClick={() => loadLevel(level)} className="border-2 border-white px-10 py-4 font-bold hover:bg-white hover:text-black transition-all uppercase">[ Resume YEAR {LEVELS[level-1].year} ]</button>
                        </div>
                    )}

                    {gameState === 'GAMEOVER' && (
                        <div className="absolute inset-0 bg-black z-[300] flex flex-col items-center justify-center text-center p-8 border-t-8 border-red-600">
                            <h1 className="text-7xl text-red-600 font-bold mb-4 tracking-tighter uppercase">Total Purge</h1>
                            <p className="text-xs tracking-[0.3em] mb-12 opacity-50 uppercase leading-loose text-white">Neural feedback failure. <br/> Re-starting Archives from Year One.</p>
                            <button onClick={() => handleStart(false)} className="border-2 border-white px-10 py-4 font-bold hover:bg-white hover:text-black transition-all uppercase">[ System Reboot ]</button>
                        </div>
                    )}

                    {gameState === 'WIN' && (
                        <div className="absolute inset-0 bg-black z-[300] flex flex-col items-center justify-center text-center border-4 border-white m-10">
                            <h1 className="text-7xl font-bold italic mb-6 tracking-tighter uppercase text-white drop-shadow-[0_0_20px_red]">Legacy Secured</h1>
                            <p className="text-red-600 text-[10px] tracking-[0.5em] mb-12 uppercase font-bold">All 10 years of the BIF Market have been stabilized.</p>
                            <button onClick={() => window.location.reload()} className="border-2 border-white px-12 py-4 font-bold hover:bg-white hover:text-black transition-all uppercase">[ System Disconnect ]</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
